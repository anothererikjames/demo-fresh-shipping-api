$kind: http-example
id: 4d1bf0d8-0d45-4855-b8a9-98de6466ff1e
request:
  url: "{{baseUrl}}/shipments/:shipmentId"
  method: PATCH
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: shipmentId
      value: shp-101
      description: Unique shipment identifier
  body:
    type: json
    content: |-
      {
        "status": "pending",
        "orderId": "ord-101",
        "carrier": "express",
        "trackingNumber": "TRK-9000101",
        "destinationPostalCode": "94107",
        "estimatedDelivery": "2026-07-20T18:00:00Z"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "shipmentId": "shp-101",
        "status": "pending",
        "orderId": "ord-101",
        "carrier": "express",
        "destinationPostalCode": "94107",
        "createdAt": "2026-07-16T20:00:00Z",
        "updatedAt": "2026-07-16T20:00:00Z",
        "trackingNumber": "TRK-9000101",
        "estimatedDelivery": "2026-07-20T18:00:00Z"
      }
order: 1000
