$kind: http-example
id: f53d05db-f915-4b59-9d20-9af2caa713b8
request:
  url: "{{baseUrl}}/shipments/:shipmentId"
  method: DELETE
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: shipmentId
      value: shp-101
      description: Unique shipment identifier
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "not_found",
        "message": "The requested resource was not found",
        "requestId": "req-9f2a"
      }
order: 3000
