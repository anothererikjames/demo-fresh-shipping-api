$kind: http-example
id: 9fb1a34f-2cb0-4245-8f15-e49072bd6a01
request:
  url: "{{baseUrl}}/shipments"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "orderId": "ord-101",
        "carrier": "express",
        "destinationPostalCode": "94107",
        "status": "pending",
        "trackingNumber": "TRK-9000101",
        "estimatedDelivery": "2026-07-20T18:00:00Z"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "not_found",
        "message": "The requested resource was not found",
        "requestId": "req-9f2a"
      }
order: 2000
