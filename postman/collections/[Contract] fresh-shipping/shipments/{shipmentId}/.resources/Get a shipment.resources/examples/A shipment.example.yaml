$kind: http-example
id: 3f572301-9c0e-4a1f-a723-8f082eba1c33
request:
  url: "{{baseUrl}}/shipments/:shipmentId"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: shipmentId
      value: shp-101
      description: Unique shipment identifier
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "shipmentId": "shp-101",
        "status": "pending",
        "orderId": "ord-101",
        "carrier": "express",
        "destinationPostalCode": "94107",
        "createdAt": "2026-07-16T20:00:00Z",
        "updatedAt": "2026-07-16T20:00:00Z",
        "trackingNumber": "TRK-9000101",
        "estimatedDelivery": "2026-07-20T18:00:00Z"
      }
order: 1000
