$kind: http-example
id: 79e6d1a7-c587-4b33-a632-0a496e8be6b5
request:
  url: "{{baseUrl}}/shipments/:shipmentId"
  method: PATCH
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: shipmentId
      value: shp-101
      description: Unique shipment identifier
  body:
    type: json
    content: |-
      {
        "status": "pending",
        "orderId": "ord-101",
        "carrier": "express",
        "trackingNumber": "TRK-9000101",
        "destinationPostalCode": "94107",
        "estimatedDelivery": "2026-07-20T18:00:00Z"
      }
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "not_found",
        "message": "The requested resource was not found",
        "requestId": "req-9f2a"
      }
order: 3000
